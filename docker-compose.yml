services:
  bot:
    image: ghcr.io/neclor/server-monitor-bot:latest
    container_name: server-monitor-bot
    env_file: .env
    environment:
      TG_BOT_SESSION_PATH: /data/bot_session
    volumes:
      - ${HOST_DATA_DIR:-./data}:/data
    restart: unless-stopped
    pid: host
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          memory: 32M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
